<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PenDrop - Journal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="logo">✒️ PenDrop</h1>
            </div>
            <div class="header-center">
                <span class="current-view">Journal</span>
            </div>
            <div class="header-right">
                <span class="save-status" id="save-status">All changes saved</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Sidebar -->
            <aside class="sidebar">
                <button id="new-journal" class="new-entry-btn">
                    <span class="icon">+</span>
                    New Entry
                </button>
                
                <div class="entries-list">
                    <div class="entries-header">
                        <span>Entries</span>
                    </div>
                    <div id="journal-list" class="item-list"></div>
                </div>
            </aside>

            <!-- Editor Area -->
            <section class="editor-section">
                <div class="editor-container">
                    <input type="text" id="journal-title" placeholder="Untitled" class="title-input">
                    
                    <div class="toolbar">
                        <button class="tool-btn" data-command="bold" title="Bold">
                            <strong>B</strong>
                        </button>
                        <button class="tool-btn" data-command="italic" title="Italic">
                            <em>I</em>
                        </button>
                        <button class="tool-btn" data-command="underline" title="Underline">
                            <u>U</u>
                        </button>
                        <span class="tool-separator"></span>
                        <button class="tool-btn" data-command="h1" title="Heading 1">H1</button>
                        <button class="tool-btn" data-command="h2" title="Heading 2">H2</button>
                        <button class="tool-btn" data-command="h3" title="Heading 3">H3</button>
                        <span class="tool-separator"></span>
                        <button class="tool-btn" data-command="ul" title="Bullet List">•</button>
                        <button class="tool-btn" data-command="ol" title="Numbered List">1.</button>
                        <span class="tool-separator"></span>
                        <button class="tool-btn" data-command="quote" title="Quote">"</button>
                    </div>
                    
                    <div id="journal-content" class="content-editor" contenteditable="true" placeholder="Start writing..."></div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
